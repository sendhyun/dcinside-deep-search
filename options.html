<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DCInside Deep Search Options</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <main>
    <h1>Options</h1>
    <label>최대 수집 글 수 <input id="maxResults" type="number" min="1" max="100"></label>
    <label>요청 간격 ms <input id="requestDelayMs" type="number" min="300" step="100"></label>
    <label><input id="dedupeResults" type="checkbox"> 중복 제거</label>
    <label><input id="allowUncertainNextUrl" type="checkbox"> 불확실한 다음 링크 자동 이동 허용</label>
    <button id="save" type="button">저장</button>
    <p id="status"></p>
  </main>
  <script type="module" src="options.js"></script>
</body>
</html>
